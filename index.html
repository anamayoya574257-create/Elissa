<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elisa • On‑Chain Playlist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #1a1025, #0a0715);
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            color: #f5eefc;
            padding: 2rem 1rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .elisa-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffd966;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, #ffe6b0, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .wallet-badge {
            background: #2a1f3e;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-top: 0.8rem;
            border: 1px solid #ffd96655;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.6rem;
        }
        .track {
            background: rgba(30, 22, 48, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.2rem;
            transition: all 0.2s;
            border: 1px solid #3a2a55;
        }
        .track:hover {
            border-color: #ffd966;
            transform: translateY(-5px);
        }
        .track-id {
            font-size: 0.8rem;
            color: #ffd966;
            background: #00000030;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
        .track-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0.75rem 0 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        audio {
            width: 100%;
            margin: 0.5rem 0;
            border-radius: 30px;
        }
        .play-btn {
            background: #ffd966;
            width: 100%;
            border: none;
            padding: 10px;
            border-radius: 60px;
            font-weight: bold;
            color: #1a0f2a;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.15s;
            margin: 0.8rem 0 0.5rem;
        }
        .play-btn:hover { background: #ffcd41; transform: scale(0.99); }
        .play-count {
            font-size: 0.7rem;
            text-align: right;
            opacity: 0.7;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.5;
        }
        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img class="elisa-img" src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Elissa_Lebanese_singer.jpg"
             alt="Elisa" onerror="this.src='https://i.imgur.com/B8z6T4M.png'">
        <h1>🎧 ELISA · blockchain playlist</h1>
        <div class="wallet-badge" id="walletStatus">🟡 connecting...</div>
    </div>
    <div id="playlistGrid" class="grid">Loading 50 tracks...</div>
    <footer>▶️ each click = base blockchain transaction | audio plays instantly</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script>
    // =============================================================
    // ✅ CONTRACT ADDRESS (YOUR DEPLOYED CONTRACT)
    const CONTRACT_ADDRESS = "0x067c4601086d23bb109685D9d288221A39908D20";
    // =============================================================

    const CONTRACT_ABI = [
        {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},
        {"anonymous":false,"inputs":[{"indexed":true,"internalType":"uint256","name":"trackId","type":"uint256"},{"indexed":false,"internalType":"string","name":"title","type":"string"},{"indexed":true,"internalType":"address","name":"user","type":"address"},{"indexed":false,"internalType":"uint256","name":"timestamp","type":"uint256"}],"name":"TrackPlayed","type":"event"},
        {"inputs":[],"name":"getAllTracks","outputs":[{"components":[{"internalType":"uint256","name":"id","type":"uint256"},{"internalType":"string","name":"title","type":"string"},{"internalType":"string","name":"audioUrl","type":"string"}],"internalType":"struct ElissaPlaylist.Track[]","name":"","type":"tuple[]"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"getPlayCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"playTrack","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[],"name":"trackCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let web3, contract, userAccount;

    window.addEventListener('load', async () => {
        if (window.ethereum) {
            web3 = new Web3(window.ethereum);
            try {
                const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = acc[0];
                document.getElementById('walletStatus').innerHTML = `✅ ${userAccount.slice(0,6)}...${userAccount.slice(-4)}`;
                contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
                await loadAllTracks();
            } catch(e) {
                document.getElementById('walletStatus').innerHTML = '❌ user denied';
            }
        } else {
            document.getElementById('walletStatus').innerHTML = '⚠️ install MetaMask for Base';
        }
    });

    async function loadAllTracks() {
        const container = document.getElementById('playlistGrid');
        try {
            const tracks = await contract.methods.getAllTracks().call();
            if (!tracks.length) throw new Error("No tracks found – did you deploy the correct contract?");
            container.innerHTML = '';
            for (let t of tracks) {
                const count = await contract.methods.getPlayCount(t.id).call();
                const card = document.createElement('div');
                card.className = 'track';
                card.innerHTML = `
                    <div class="track-id">#${t.id}</div>
                    <div class="track-title">${escapeHtml(t.title)}</div>
                    <audio controls preload="metadata">
                        <source src="${t.audioUrl}" type="audio/mpeg">
                    </audio>
                    <button class="play-btn" data-id="${t.id}" data-title="${escapeHtml(t.title)}">⛓️ PLAY & RECORD ON CHAIN ⛓️</button>
                    <div class="play-count">🎧 on‑chain plays: ${count}</div>
                `;
                container.appendChild(card);
            }
            // attach listeners
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    const title = btn.getAttribute('data-title');
                    if (!contract || !userAccount) return alert('Connect wallet first');
                    const originalText = btn.innerText;
                    btn.innerText = '⏳ sending transaction...';
                    btn.disabled = true;
                    try {
                        await contract.methods.playTrack(id).send({ from: userAccount });
                        const newCount = await contract.methods.getPlayCount(id).call();
                        const countDiv = btn.parentElement.querySelector('.play-count');
                        if (countDiv) countDiv.innerText = `🎧 on‑chain plays: ${newCount}`;
                        alert(`✅ "${title}" recorded on Base blockchain!`);
                    } catch (err) {
                        alert('❌ transaction failed: ' + err.message.slice(0, 100));
                    }
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
            });
        } catch (err) {
            container.innerHTML = `<div style="color:#ffaa88; text-align:center;">⚠️ Error: ${err.message}<br><br>Make sure the contract is deployed on Base Mainnet and you're connected to the right network.</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
  </html>
